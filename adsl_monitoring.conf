# Configuration for the adsl_monitoring service.
# Read by systemd via EnvironmentFile= and exposed to the script as env vars.
# Format is KEY=VALUE, one per line (systemd syntax: no quotes needed, no export).
# Deploy to: /etc/adsl_monitoring/adsl_monitoring.conf

# --- Philips Hue ---
HUE_BRIDGE_HOST=PhilipsHueBridge
HUE_GROUP=17
HUE_API_KEY_FILE=/etc/adsl_monitoring/Philips_Hue_API_Key.txt
HUE_RETRY_DELAY=5
HUE_TIMEOUT=10
# Seconds between green dim-down steps in the UP/SHOWTIME state.
HUE_SHOWTIME_DIM_INTERVAL=5

# --- SNMP (Draytek Vigor 165 modem) ---
SNMP_TARGET_HOST=192.168.2.2
SNMP_COMMUNITY=public
SNMP_VERSION=1
SNMP_RETRY_COUNT=0
SNMP_OID=.1.3.6.1.2.1.10.94.1.1.3.1.6.4
